<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Kuppiya | Custom QR Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-style {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }
        #canvas-container canvas {
            max-width: 100% !important;
            height: auto !important;
            border-radius: 12px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">

<div class="w-full max-w-4xl">
    <div class="glass-card rounded-[2rem] p-6 md:p-10 shadow-2xl">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-emerald-400">
                Digi Kuppiya QR
            </h1>
            <p class="text-slate-400 mt-2 text-sm">Paste your link and generate a high-quality QR code.</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="flex-1 order-2 lg:order-1 space-y-6">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-sky-400 mb-2">Paste User Link Here</label>
                    <input type="text" id="qr-data" placeholder="https://example.com" 
                           class="input-style w-full p-4 rounded-2xl text-base focus:outline-none focus:border-sky-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-sky-400 mb-2">QR Color</label>
                        <input type="color" id="qr-color" value="#38bdf8" class="w-full h-12 bg-transparent cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-sky-400 mb-2">Dot Style</label>
                        <select id="qr-dot-style" class="input-style w-full p-3 rounded-2xl appearance-none">
                            <option value="rounded">Rounded</option>
                            <option value="dots">Dots</option>
                            <option value="square">Square</option>
                        </select>
                    </div>
                </div>

                <button onclick="downloadQR()" 
                        class="w-full py-4 bg-gradient-to-r from-sky-500 to-emerald-500 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                    Download PNG
                </button>
            </div>

            <div class="flex-1 order-1 lg:order-2 flex flex-col items-center">
                <div class="bg-black/30 rounded-[1.5rem] p-6 flex flex-col items-center justify-center border border-white/5 w-full">
                    <div id="canvas-container"></div>
                    <p class="mt-4 text-[10px] text-slate-500 uppercase tracking-widest">Live Preview</p>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const qrCode = new QRCodeStyling({
        width: 300,
        height: 300,
        type: "svg",
        data: "Enter Link", // Default text until user types
        dotsOptions: {
            color: "#38bdf8",
            type: "rounded"
        },
        backgroundOptions: {
            color: "#ffffff",
        }
    });

    qrCode.append(document.getElementById("canvas-container"));

    // User input change වෙනකොට QR එකත් වෙනස් වෙනවා
    document.getElementById("qr-data").addEventListener("input", (e) => {
        qrCode.update({
            data: e.target.value || "Enter Link"
        });
    });

    document.getElementById("qr-color").addEventListener("input", (e) => {
        qrCode.update({
            dotsOptions: { color: e.target.value }
        });
    });

    document.getElementById("qr-dot-style").addEventListener("change", (e) => {
        qrCode.update({
            dotsOptions: { type: e.target.value }
        });
    });

    function downloadQR() {
        qrCode.download({ name: "DigiKuppiya_QR", extension: "png" });
    }
</script>

</body>
</html>
