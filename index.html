<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Kuppiya | Ultimate QR Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body {
            background: #050505;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .input-box:focus {
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.08);
        }
        #canvas-container canvas {
            max-width: 100% !important;
            height: auto !important;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

<div class="max-w-6xl mx-auto">
    <div class="text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-sky-400 via-blue-500 to-emerald-400">
            Digi Kuppiya QR Studio
        </h1>
        <p class="text-slate-400 mt-4 text-lg">Professional, Lifetime & Highly Customizable QR Codes</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            
            <div class="glass-panel p-6 rounded-[2rem] space-y-6">
                <div>
                    <label class="text-xs font-bold uppercase text-sky-400 tracking-widest block mb-2">1. Target Link / Text</label>
                    <input type="text" id="qr-data" placeholder="https://digikuppiya.com" 
                           class="input-box w-full p-4 rounded-2xl outline-none text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <label class="text-xs font-bold uppercase text-sky-400 tracking-widest block">2. Shapes & Style</label>
                        <select id="qr-dot-style" class="input-box w-full p-3 rounded-xl outline-none">
                            <option value="rounded">Dots: Rounded</option>
                            <option value="dots">Dots: Circles</option>
                            <option value="square">Dots: Square</option>
                            <option value="extra-rounded">Dots: Bold</option>
                        </select>
                        <select id="qr-eye-style" class="input-box w-full p-3 rounded-xl outline-none">
                            <option value="extra-rounded">Eyes: Rounded</option>
                            <option value="square">Eyes: Square</option>
                        </select>
                    </div>

                    <div class="space-y-4">
                        <label class="text-xs font-bold uppercase text-sky-400 tracking-widest block">3. Custom Colors (Gradient)</label>
                        <div class="flex gap-3">
                            <input type="color" id="qr-color-1" value="#38bdf8" class="flex-1 h-12 bg-transparent border-none cursor-pointer">
                            <input type="color" id="qr-color-2" value="#10b981" class="flex-1 h-12 bg-transparent border-none cursor-pointer">
                        </div>
                        <p class="text-[10px] text-slate-500 text-center">Color 1 & Color 2 for smooth gradient</p>
                    </div>
                </div>

                <div class="pt-4 border-t border-white/5">
                    <label class="text-xs font-bold uppercase text-sky-400 tracking-widest block mb-3">4. Add Your Logo</label>
                    <input type="file" id="qr-logo" accept="image/*" 
                           class="text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-sky-500/10 file:text-sky-400 hover:file:bg-sky-500/20 cursor-pointer w-full">
                </div>
            </div>

            <div class="glass-panel p-6 rounded-[2rem] flex flex-col md:flex-row items-center gap-4">
                <select id="download-format" class="input-box p-4 rounded-2xl outline-none w-full md:w-32">
                    <option value="png">PNG</option>
                    <option value="svg">SVG</option>
                    <option value="jpeg">JPG</option>
                </select>
                <button onclick="downloadQR()" 
                        class="w-full p-4 bg-gradient-to-r from-sky-500 to-blue-600 rounded-2xl font-bold text-lg hover:shadow-[0_0_30px_rgba(56,189,248,0.4)] transition-all active:scale-95">
                    Generate & Download
                </button>
            </div>
        </div>

        <div class="lg:col-span-5">
            <div class="glass-panel p-8 rounded-[2rem] sticky top-10 flex flex-col items-center">
                <div class="bg-white p-4 rounded-3xl shadow-inner">
                    <div id="canvas-container"></div>
                </div>
                <div class="mt-8 text-center">
                    <div class="flex items-center justify-center gap-2 mb-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span class="text-xs font-bold text-slate-400 uppercase">Live Studio Preview</span>
                    </div>
                    <p class="text-[11px] text-slate-500 max-w-[200px]">Scan this to test before downloading</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    let logoData = "";
    const qrCode = new QRCodeStyling({
        width: 300,
        height: 300,
        type: "svg",
        data: "https://digikuppiya.com",
        image: "",
        dotsOptions: {
            type: "rounded",
            gradient: {
                type: "linear",
                colorStops: [{ offset: 0, color: "#38bdf8" }, { offset: 1, color: "#10b981" }]
            }
        },
        backgroundOptions: { color: "#ffffff" },
        imageOptions: { crossOrigin: "anonymous", margin: 8, imageSize: 0.4 },
        cornersSquareOptions: { type: "extra-rounded", color: "#000000" }
    });

    qrCode.append(document.getElementById("canvas-container"));

    // Event Listeners
    document.getElementById("qr-data").addEventListener("input", (e) => {
        qrCode.update({ data: e.target.value || "Digi Kuppiya" });
    });

    const updateColors = () => {
        const c1 = document.getElementById("qr-color-1").value;
        const c2 = document.getElementById("qr-color-2").value;
        qrCode.update({
            dotsOptions: {
                gradient: { type: "linear", colorStops: [{ offset: 0, color: c1 }, { offset: 1, color: c2 }] }
            }
        });
    };

    document.getElementById("qr-color-1").addEventListener("input", updateColors);
    document.getElementById("qr-color-2").addEventListener("input", updateColors);

    document.getElementById("qr-dot-style").addEventListener("change", (e) => {
        qrCode.update({ dotsOptions: { type: e.target.value } });
    });

    document.getElementById("qr-eye-style").addEventListener("change", (e) => {
        qrCode.update({ cornersSquareOptions: { type: e.target.value } });
    });

    document.getElementById("qr-logo").addEventListener("change", (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = () => {
            logoData = reader.result;
            qrCode.update({ image: logoData });
        };
        reader.readAsDataURL(file);
    });

    function downloadQR() {
        const format = document.getElementById("download-format").value;
        qrCode.download({ name: "DigiKuppiya_QR", extension: format });
    }
</script>

</body>
</html>
